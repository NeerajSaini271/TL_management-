<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TL Management System</title>
<style>
:root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --green: #22c55e; --red: #ef4444; --text: #e2e8f0; --muted: #94a3b8; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
nav { background: var(--card); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
nav h1 { color: var(--blue); font-size: 20px; }
nav .user { display: flex; align-items: center; gap: 15px; }
.btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
.btn-blue { background: var(--blue); color: white; }
.btn-green { background: var(--green); color: white; }
.btn-red { background: var(--red); color: white; }
.btn-outline { background: transparent; border: 1px solid var(--blue); color: var(--blue); }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
.card { background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 20px; }
.card h2 { margin-bottom: 15px; color: var(--blue); font-size: 18px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
.stat { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; }
.stat h3 { font-size: 32px; color: var(--blue); }
.stat p { color: var(--muted); margin-top: 5px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
th { color: var(--muted); font-weight: 600; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 5px; color: var(--muted); }
.form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: var(--bg); color: white; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-green { background: var(--green); color: white; }
.badge-red { background: var(--red); color: white; }
.badge-yellow { background: #eab308; color: black; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
.modal.active { display: flex; }
.modal-content { background: var(--card); padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; }
.tabs { display: flex; gap: 5px; margin-bottom: 20px; }
.tab { padding: 10px 20px; background: var(--bg); border: none; color: var(--muted); cursor: pointer; border-radius: 8px 8px 0 0; }
.tab.active { background: var(--blue); color: white; }
.hidden { display: none; }
</style>
</head>
<body>

<!-- NAVIGATION -->
<nav>
  <h1>🏢 TL Management</h1>
  <div class="user" id="nav-user">
    <span id="nav-email"></span>
    <button class="btn btn-outline" onclick="showPage('login')" id="nav-login-btn">Login</button>
    <button class="btn btn-red hidden" onclick="logout()" id="nav-logout-btn">Logout</button>
  </div>
</nav>

<div class="container">

  <!-- LOGIN PAGE -->
  <div id="page-login">
    <div style="max-width:400px;margin:50px auto">
      <div class="card">
        <h2>Login</h2>
        <div class="form-group"><label>Email</label><input type="email" id="login-email" value="admin@company.com"></div>
        <div class="form-group"><label>Password</label><input type="password" id="login-password" value="NewPass@123!"></div>
        <button class="btn btn-blue" onclick="login()" style="width:100%">Login</button>
        <p id="login-error" style="color:red;margin-top:10px"></p>
        <p style="margin-top:15px;text-align:center"><a href="#" onclick="showPage('register')" style="color:var(--blue)">Create account</a></p>
      </div>
    </div>
  </div>

  <!-- REGISTER PAGE -->
  <div id="page-register" class="hidden">
    <div style="max-width:400px;margin:50px auto">
      <div class="card">
        <h2>Register</h2>
        <div class="form-group"><label>Name</label><input type="text" id="reg-name"></div>
        <div class="form-group"><label>Email</label><input type="email" id="reg-email"></div>
        <div class="form-group"><label>Password</label><input type="password" id="reg-password"></div>
        <div class="form-group"><label>Department</label><input type="text" id="reg-dept"></div>
        <button class="btn btn-blue" onclick="register()" style="width:100%">Register</button>
        <p style="margin-top:15px;text-align:center"><a href="#" onclick="showPage('login')" style="color:var(--blue)">Back to login</a></p>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="page-dashboard" class="hidden">
    <div class="stats">
      <div class="stat"><h3 id="stat-employees">-</h3><p>Team Members</p></div>
      <div class="stat"><h3 id="stat-present">-</h3><p>Present Today</p></div>
      <div class="stat"><h3 id="stat-tls">-</h3><p>Team Leads</p></div>
      <div class="stat"><h3 id="stat-ratings">-</h3><p>Ratings Given</p></div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>📋 Quick Attendance</h2>
        <div class="form-group"><label>Status</label><select id="quick-status"><option>PRESENT</option><option>ABSENT</option><option>LEAVE</option><option>HALF_DAY</option></select></div>
        <button class="btn btn-green" onclick="quickMark()">Mark Attendance</button>
        <p id="quick-result" style="margin-top:10px;color:var(--green)"></p>
      </div>
      <div class="card">
        <h2>⭐ Quick Rating</h2>
        <div class="form-group"><label>Employee ID</label><input type="number" id="quick-emp-id" placeholder="Enter employee ID"></div>
        <div class="form-group"><label>Score (1-10)</label><input type="number" id="quick-score" min="1" max="10" value="8"></div>
        <div class="form-group"><label>Month</label><input type="text" id="quick-month" value="2026-05"></div>
        <button class="btn btn-blue" onclick="quickRate()">Submit Rating</button>
        <p id="rate-result" style="margin-top:10px;color:var(--green)"></p>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs" style="margin-top:20px">
      <button class="tab active" onclick="switchTab('employees')">Employees</button>
      <button class="tab" onclick="switchTab('tls')">Team Leads</button>
      <button class="tab" onclick="switchTab('attendance')">Attendance</button>
      <button class="tab" onclick="switchTab('ratings')">My Ratings</button>
      <button class="tab" onclick="switchTab('audit')">Audit Logs</button>
    </div>

    <div id="tab-employees" class="card">
      <h2>Team Members</h2>
      <div id="employees-table"></div>
    </div>
    <div id="tab-tls" class="card hidden">
      <h2>Team Leads</h2>
      <button class="btn btn-green" onclick="showAddTL()" style="margin-bottom:15px">+ Add TL</button>
      <div id="tls-table"></div>
    </div>
    <div id="tab-attendance" class="card hidden">
      <h2>My Attendance History</h2>
      <div id="attendance-table"></div>
    </div>
    <div id="tab-ratings" class="card hidden">
      <h2>My Ratings</h2>
      <div id="ratings-table"></div>
    </div>
    <div id="tab-audit" class="card hidden">
      <h2>Audit Logs</h2>
      <div id="audit-table"></div>
    </div>
  </div>
</div>

<!-- ADD TL MODAL -->
<div class="modal" id="modal-tl">
  <div class="modal-content">
    <h2>Add Team Lead</h2>
    <div class="form-group"><label>Name</label><input type="text" id="tl-name"></div>
    <div class="form-group"><label>Email</label><input type="email" id="tl-email"></div>
    <div class="form-group"><label>Password</label><input type="password" id="tl-password"></div>
    <div class="form-group"><label>Department</label><input type="text" id="tl-dept"></div>
    <button class="btn btn-green" onclick="addTL()">Create TL</button>
    <button class="btn btn-outline" onclick="closeModal('modal-tl')" style="margin-left:10px">Cancel</button>
  </div>
</div>

<script>
var API = '/api/v1';
var currentUser = null;

function showPage(page) {
  document.querySelectorAll('[id^="page-"]').forEach(function(p) { p.classList.add('hidden'); });
  var el = document.getElementById('page-' + page);
  if (el) el.classList.remove('hidden');
  if (page === 'dashboard') loadDashboard();
}

async function api(method, path, body) {
  var opts = { method: method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(API + path, opts);
  return res.json();
}

async function login() {
  var email = document.getElementById('login-email').value;
  var password = document.getElementById('login-password').value;
  var data = await api('POST', '/auth/login', { email: email, password: password });
  if (data.success) {
    currentUser = data.data.user;
    document.getElementById('nav-email').textContent = currentUser.email + ' (' + currentUser.role + ')';
    document.getElementById('nav-login-btn').classList.add('hidden');
    document.getElementById('nav-logout-btn').classList.remove('hidden');
    showPage('dashboard');
  } else {
    document.getElementById('login-error').textContent = data.message || 'Login failed';
  }
}

async function register() {
  var data = await api('POST', '/auth/register', {
    email: document.getElementById('reg-email').value,
    password: document.getElementById('reg-password').value,
    name: document.getElementById('reg-name').value,
    department: document.getElementById('reg-dept').value
  });
  if (data.success) showPage('login');
}

async function logout() {
  await api('POST', '/auth/logout');
  currentUser = null;
  document.getElementById('nav-email').textContent = '';
  document.getElementById('nav-login-btn').classList.remove('hidden');
  document.getElementById('nav-logout-btn').classList.add('hidden');
  showPage('login');
}

async function loadDashboard() {
  var me = await api('GET', '/auth/me');
  if (me.data) currentUser = me.data;
  
  var tls = await api('GET', '/tls');
  if (tls.data) document.getElementById('stat-tls').textContent = tls.data.length;
  
  var att = await api('GET', '/attendance/today');
  document.getElementById('stat-present').textContent = att.data && att.data.marked ? 1 : 0;
  
  document.getElementById('stat-employees').textContent = '-';
  document.getElementById('stat-ratings').textContent = '-';
  
  loadEmployees();
}

async function loadEmployees() {
  var data = await api('GET', '/tls');
  var html = '<table><tr><th>ID</th><th>Name</th><th>Email</th><th>Department</th><th>Status</th></tr>';
  if (data.data) {
    data.data.forEach(function(tl) {
      html += '<tr><td>' + tl.id + '</td><td>' + tl.name + '</td><td>' + tl.email + '</td><td>' + tl.department + '</td><td><span class="badge ' + (tl.is_active ? 'badge-green' : 'badge-red') + '">' + (tl.is_active ? 'Active' : 'Inactive') + '</span></td></tr>';
    });
  }
  html += '</table>';
  document.getElementById('employees-table').innerHTML = html;
  document.getElementById('stat-employees').textContent = data.data ? data.data.length : 0;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('[id^="tab-"]').forEach(function(t) { t.classList.add('hidden'); });
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.remove('hidden');
  if (tab === 'tls') loadTLs();
  if (tab === 'attendance') loadAttendance();
  if (tab === 'ratings') loadRatings();
  if (tab === 'audit') loadAudit();
}

async function loadTLs() {
  var data = await api('GET', '/tls');
  var html = '<table><tr><th>ID</th><th>Name</th><th>Email</th><th>Department</th><th>Status</th></tr>';
  if (data.data) {
    data.data.forEach(function(tl) {
      html += '<tr><td>' + tl.id + '</td><td>' + tl.name + '</td><td>' + tl.email + '</td><td>' + tl.department + '</td><td><span class="badge ' + (tl.is_active ? 'badge-green' : 'badge-red') + '">' + (tl.is_active ? 'Active' : 'Inactive') + '</span></td></tr>';
    });
  }
  html += '</table>';
  document.getElementById('tls-table').innerHTML = html;
}

async function loadAttendance() {
  var data = await api('GET', '/attendance/my');
  var html = '<table><tr><th>Date</th><th>Status</th><th>Late</th><th>Comment</th></tr>';
  if (data.data) {
    data.data.forEach(function(a) {
      html += '<tr><td>' + new Date(a.date).toLocaleDateString() + '</td><td>' + a.status + '</td><td>' + (a.is_late ? '⚠️ Yes' : '✅ No') + '</td><td>' + (a.comment || '-') + '</td></tr>';
    });
  }
  html += '</table>';
  document.getElementById('attendance-table').innerHTML = html;
}

async function loadRatings() {
  var data = await api('GET', '/ratings/my');
  var html = '<table><tr><th>Month</th><th>Score</th><th>Comment</th></tr>';
  if (data.data) {
    data.data.forEach(function(r) {
      html += '<tr><td>' + r.month + '</td><td>' + r.score + '/10</td><td>' + (r.comment || '-') + '</td></tr>';
    });
  }
  html += '</table>';
  document.getElementById('ratings-table').innerHTML = html;
  document.getElementById('stat-ratings').textContent = data.data ? data.data.length : 0;
}

async function loadAudit() {
  var data = await api('GET', '/audit/logs');
  var html = '<table><tr><th>Action</th><th>Resource</th><th>Detail</th><th>Time</th></tr>';
  if (data.data) {
    data.data.slice(0, 20).forEach(function(a) {
      html += '<tr><td>' + a.action + '</td><td>' + a.resource + '</td><td>' + (a.detail || '-') + '</td><td>' + new Date(a.created_at).toLocaleString() + '</td></tr>';
    });
  }
  html += '</table>';
  document.getElementById('audit-table').innerHTML = html;
}

async function quickMark() {
  var status = document.getElementById('quick-status').value;
  var data = await api('POST', '/attendance/mark', { status: status });
  document.getElementById('quick-result').textContent = data.success ? 'Marked ' + status + '!' : data.message;
  if (data.success) loadAttendance();
}

async function quickRate() {
  var data = await api('POST', '/ratings', {
    userId: document.getElementById('quick-emp-id').value,
    month: document.getElementById('quick-month').value,
    score: parseInt(document.getElementById('quick-score').value),
    comment: 'Quick rating'
  });
  document.getElementById('rate-result').textContent = data.success ? 'Rating submitted!' : data.message;
  if (data.success) loadRatings();
}

function showAddTL() { document.getElementById('modal-tl').classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

async function addTL() {
  var data = await api('POST', '/tls', {
    name: document.getElementById('tl-name').value,
    email: document.getElementById('tl-email').value,
    password: document.getElementById('tl-password').value,
    department: document.getElementById('tl-dept').value
  });
  if (data.success) {
    closeModal('modal-tl');
    loadTLs();
  }
}

showPage('login');
</script>
</body>
</html>
