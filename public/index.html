<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TL Management - Enterprise Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.header { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 24px; color: #38bdf8; }
.btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
.btn-primary { background: #3b82f6; color: white; }
.btn-danger { background: #ef4444; color: white; }
.btn-success { background: #22c55e; color: white; }
.card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
.card h2 { margin-bottom: 15px; color: #38bdf8; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 5px; color: #94a3b8; }
.form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
pre { background: #0f172a; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
.badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-green { background: #22c55e; color: white; }
.badge-red { background: #ef4444; color: white; }
.badge-yellow { background: #eab308; color: black; }
.tabs { display: flex; gap: 10px; margin-bottom: 20px; }
.tab { padding: 10px 20px; background: #1e293b; border-radius: 8px; cursor: pointer; }
.tab.active { background: #3b82f6; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🛡️ TL Management System</h1>
    <div id="auth-status">
      <button class="btn btn-primary" onclick="showLogin()">Login</button>
    </div>
  </div>

  <div id="login-section" style="display:none">
    <div class="card">
      <h2>Login</h2>
      <div class="form-group"><label>Email</label><input type="email" id="login-email" value="admin@company.com"></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-password" value="NewPass@123!"></div>
      <button class="btn btn-primary" onclick="login()">Login</button>
      <button class="btn btn-success" style="margin-left:10px" onclick="showRegister()">Register</button>
      <p id="login-error" style="color:red;margin-top:10px"></p>
    </div>
  </div>

  <div id="register-section" style="display:none">
    <div class="card">
      <h2>Register</h2>
      <div class="form-group"><label>Email</label><input type="email" id="reg-email"></div>
      <div class="form-group"><label>Password</label><input type="password" id="reg-password"></div>
      <div class="form-group"><label>Name</label><input type="text" id="reg-name"></div>
      <button class="btn btn-primary" onclick="register()">Register</button>
      <button class="btn" onclick="showLogin()">Back to Login</button>
    </div>
  </div>

  <div id="dashboard" style="display:none">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('overview')">Overview</div>
      <div class="tab" onclick="switchTab('mfa')">MFA</div>
      <div class="tab" onclick="switchTab('apikeys')">API Keys</div>
      <div class="tab" onclick="switchTab('canary')">Canary</div>
      <div class="tab" onclick="switchTab('attendance')">Attendance</div>
      <div class="tab" onclick="switchTab('audit')">Audit Logs</div>
    </div>

    <div id="tab-overview" class="grid">
      <div class="card"><h2>Health</h2><pre id="health-data">Loading...</pre></div>
      <div class="card"><h2>Profile</h2><pre id="profile-data">Loading...</pre></div>
      <div class="card"><h2>Security Features</h2><pre id="features-data">Loading...</pre></div>
    </div>

    <div id="tab-mfa" style="display:none" class="card">
      <h2>MFA Setup</h2>
      <button class="btn btn-primary" onclick="setupMFA()">Setup MFA</button>
      <div id="mfa-qr" style="margin-top:15px"></div>
      <div class="form-group" style="margin-top:15px"><label>Verify Token</label><input type="text" id="mfa-token"></div>
      <button class="btn btn-success" onclick="verifyMFA()">Verify MFA</button>
    </div>

    <div id="tab-apikeys" style="display:none" class="card">
      <h2>API Keys</h2>
      <div class="form-group"><label>Key Name</label><input type="text" id="apikey-name" value="My Key"></div>
      <div class="form-group"><label>Scopes</label><input type="text" id="apikey-scopes" value="read,write"></div>
      <button class="btn btn-primary" onclick="createAPIKey()">Create Key</button>
      <div id="apikey-result" style="margin-top:15px"></div>
      <div id="apikey-list" style="margin-top:15px"></div>
    </div>

    <div id="tab-canary" style="display:none" class="card">
      <h2>Canary Tokens</h2>
      <button class="btn btn-primary" onclick="deployCanary()">Deploy Honeypot</button>
      <button class="btn btn-success" style="margin-left:10px" onclick="listCanaries()">List Canaries</button>
      <pre id="canary-result" style="margin-top:15px"></pre>
    </div>

    <div id="tab-attendance" style="display:none" class="card">
      <h2>Attendance</h2>
      <div class="form-group"><label>Status</label><select id="att-status"><option>PRESENT</option><option>ABSENT</option><option>LEAVE</option><option>HALF_DAY</option></select></div>
      <button class="btn btn-primary" onclick="markAttendance()">Mark Attendance</button>
      <button class="btn btn-success" style="margin-left:10px" onclick="getAttendance()">My History</button>
      <pre id="attendance-result" style="margin-top:15px"></pre>
    </div>

    <div id="tab-audit" style="display:none" class="card">
      <h2>Audit Logs</h2>
      <button class="btn btn-primary" onclick="getAuditLogs()">Load Logs</button>
      <pre id="audit-result" style="margin-top:15px"></pre>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api/v1';

async function apiCall(method, path, body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

function showLogin() {
  document.getElementById('login-section').style.display = 'block';
  document.getElementById('register-section').style.display = 'none';
  document.getElementById('dashboard').style.display = 'none';
}
function showRegister() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('register-section').style.display = 'block';
}
async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  try {
    const data = await apiCall('POST', '/auth/login', { email, password });
    if (data.success) {
      document.getElementById('auth-status').innerHTML = `<span>${data.data.user.email} (${data.data.user.role})</span> <button class="btn btn-danger" onclick="logout()">Logout</button>`;
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadDashboard();
    } else {
      document.getElementById('login-error').textContent = data.message;
    }
  } catch(e) { document.getElementById('login-error').textContent = 'Login failed'; }
}
async function register() {
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  const name = document.getElementById('reg-name').value;
  const data = await apiCall('POST', '/auth/register', { email, password, name });
  if (data.success) showLogin();
}
async function logout() {
  await apiCall('POST', '/auth/logout');
  document.getElementById('auth-status').innerHTML = '<button class="btn btn-primary" onclick="showLogin()">Login</button>';
  document.getElementById('dashboard').style.display = 'none';
  showLogin();
}
async function loadDashboard() {
  const health = await apiCall('GET', '/health');
  document.getElementById('health-data').textContent = JSON.stringify(health, null, 2);
  const me = await apiCall('GET', '/auth/me');
  document.getElementById('profile-data').textContent = JSON.stringify(me, null, 2);
  document.getElementById('features-data').textContent = health.features ? health.features.join('\n') : 'N/A';
}
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('[id^="tab-"]').forEach(d => d.style.display = 'none');
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).style.display = 'block';
}
async function setupMFA() {
  const data = await apiCall('GET', '/mfa/setup');
  if (data.data && data.data.qrCode) {
    document.getElementById('mfa-qr').innerHTML = `<img src="${data.data.qrCode}" width="200"><br><small>Secret: ${data.data.secret}</small>`;
  }
}
async function verifyMFA() {
  const token = document.getElementById('mfa-token').value;
  const data = await apiCall('POST', '/mfa/verify', { token });
  alert(JSON.stringify(data));
}
async function createAPIKey() {
  const name = document.getElementById('apikey-name').value;
  const scopes = document.getElementById('apikey-scopes').value;
  const data = await apiCall('POST', '/api-keys', { name, scopes });
  document.getElementById('apikey-result').textContent = JSON.stringify(data, null, 2);
  listAPIKeys();
}
async function listAPIKeys() {
  const data = await apiCall('GET', '/api-keys');
  document.getElementById('apikey-list').innerHTML = '<h3>Your Keys:</h3>' + JSON.stringify(data, null, 2);
}
async function deployCanary() {
  const data = await apiCall('POST', '/canary/deploy', { type: 'honeypot', resource: 'admin_panel' });
  document.getElementById('canary-result').textContent = JSON.stringify(data, null, 2);
}
async function listCanaries() {
  const data = await apiCall('GET', '/canary/registry');
  document.getElementById('canary-result').textContent = JSON.stringify(data, null, 2);
}
async function markAttendance() {
  const status = document.getElementById('att-status').value;
  const data = await apiCall('POST', '/attendance/mark', { status });
  document.getElementById('attendance-result').textContent = JSON.stringify(data, null, 2);
}
async function getAttendance() {
  const data = await apiCall('GET', '/attendance/my');
  document.getElementById('attendance-result').textContent = JSON.stringify(data, null, 2);
}
async function getAuditLogs() {
  const data = await apiCall('GET', '/audit/logs');
  document.getElementById('audit-result').textContent = JSON.stringify(data, null, 2);
}
showLogin();
</script>
</body>
</html>
